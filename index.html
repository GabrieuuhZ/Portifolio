<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- google fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
    <!--end font-->
    <!--bootstrap icons-->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!--end boot-->
    <link rel="stylesheet" href="style.css">
    <title>Portfólio</title>
</head>
<body>

    <header>
        <div class="interface">
            <div class="logo">
                <a href="#">
                    <img src="images/logo.png" alt="logo">
                </a>
            </div>

        <nav class="menu-desktop">
            <ul>
                <li><a href="#">Início</a></li>
                <li><a href="#">Redes</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Projetos</a></li>
            </ul>
        </nav>

        <div class="Contato">
            <a href="#">
                <button>Contato</button>
            </a>
        </div>
    </header>

    <main>
        <section class="topo-do-site">
            <div class="interface">
                <div class="flex">
                    <div class="txt-topo-site">
                        <h1>GABRIEL PEDRO SILVA</h1>
                        <p>Ciência da Computação <span>•</span> Cibersegurança <span>•</span> Desenvolvimento</p>

                        <div class="Contato">
                            <a href="#">
                                <button>Entre em contato</button>
                            </a>
                        </div>
                    </div>

                    <div class="foto">
                        <img src="images/1754357989449.jpg" alt="foto">
                    </div>
                </div>
            </div>
        </section>

        <section class="redes">
            <div class="interface">
                <h2 class="titulo">REDES <span>SOCIAIS.</span></h2>
                <div class="flex">
                    <div class="redes-box">
                        <i class="bi bi-linkedin"></i>
                        <h3>Linkedin</h3>
                        <p>Conecte-se comigo profissionalmente.</p>
                    </div>

                    <div class="redes-box">
                        <i class="bi bi-github"></i>
                        <h3>GitHub</h3>
                        <p>Veja meus projetos e códigos.</p>
                    </div>

                    <div class="redes-box">
                        <i class="bi bi-code-slash"></i>
                        <h3>Skills</h3>
                        <p>Minhas principais habilidades em tecnologia</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
</body>
</html>
